<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acharya Smiths</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Georgia', serif;
      color: white;
      overflow-x: hidden;
      background: #0f0f0f;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 50%;
      left: 50%;
      height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      filter: brightness(40%);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 3px;
    }

    p {
      color: #ccc;
      margin-top: 10px;
    }

    .scroll {
  position: absolute;
  bottom: 40px;
  left: 0;
  width: 100%;
  text-align: center;
  color: #c5a46d;
  animation: bounce 2s infinite;
  cursor: pointer;
  font-size: 14px;
}

    /* NEXT SECTION */
    .section {
      height: 100vh;
      background: #f8f6f2;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .section p {
      color: #555;
      max-width: 400px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <video autoplay muted loop playsinline>
      <source src="DE028DC8-8EFB-4B72-909C-5D55BE438479.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
      <h1>Acharya Smiths</h1>
      <p>Crafted by Hand. Defined by Legacy.</p>
    </div>

    <div class="scroll" onclick="scrollToNext()">
  <div style="font-size: 20px;">↓</div>
  <div>Discover</div>
</div>
  </div>

  <!-- NEXT SECTION -->
  <div class="section" id="next">
    <div>
      <h2>100 Years of Craftsmanship</h2>
      <p>
        From traditional handwork to modern precision, Acharya Smiths blends heritage with innovation to create timeless jewellery.
      </p>
    </div>
  </div>

  <script>
    function scrollToNext() {
      document.getElementById("next").scrollIntoView({ behavior: "smooth" });
    }
  </script>

</body>
</html>
