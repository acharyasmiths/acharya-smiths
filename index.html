<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acharya Smiths</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Georgia', serif;
      color: white;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 50%;
      left: 50%;
      height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      filter: brightness(40%);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 3px;
    }

    p {
      color: #ccc;
      margin-top: 10px;
    }

    .scroll {
      position: absolute;
      bottom: 30px;
      font-size: 14px;
      color: #c5a46d;
      animation: bounce 2s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }
  </style>
</head>

<body>

  <div class="hero">
    <video autoplay muted loop playsinline>
      <source src="DE028DC8-8EFB-4B72-909C-5D55BE438479.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
      <h1>Acharya Smiths</h1>
      <p>Crafted by Hand. Defined by Legacy.</p>
    </div>

    <div class="scroll">↓ Discover</div>
  </div>

</body>
</html>
